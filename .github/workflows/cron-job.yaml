name: Call API routinely
on:
  schedule:
    # Run at 00:05 GMT+7 (17:05 UTC)
    - cron: '5 17 * * *'
    # Run at 08:00 GMT+7 (01:00 UTC)
    - cron: '0 1 * * *'

  workflow_dispatch:

jobs:
  trigger-webhooks:
    runs-on: ubuntu-latest
    steps:
      - name: Call update-overdue-chore-status
        run: |
          curl -X GET https://flatastic02.vercel.app/api/webhooks/update-overdue-chore-status \
            -H "x-webhook-secret: ${{ secrets.WEBHOOK_SECRET }}"

      - name: Call chore-reminder
        run: |
          curl -X GET https://flatastic02.vercel.app/api/webhooks/chore-reminder \
            -H "x-webhook-secret: ${{ secrets.WEBHOOK_SECRET }}"

      - name: Call water-outage-check
        run: |
          curl -X GET https://flatastic02.vercel.app/api/webhooks/water-outage-check \
            -H "x-webhook-secret: ${{ secrets.WEBHOOK_SECRET }}"
